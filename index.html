<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheryl Nauman - Photographer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-title">CHERYL NAUMAN - Photographer</div>
        <button class="book-now-btn">Book Now</button>
    </div>
    <div class="container">
        <div class="background"></div>
        <div class="aperture-overlay">
            <svg id="apertureSvg" preserveAspectRatio="none" width="100%" height="100%" overflow="hidden">
                <defs>
                    <linearGradient id="bladeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1a1a1a" />
                        <stop offset="100%" style="stop-color:#0a0a0a" />
                    </linearGradient>
                    <linearGradient id="bladeGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#222" />
                        <stop offset="100%" style="stop-color:#0d0d0d" />
                    </linearGradient>
                    <filter id="emboss" x="-10%" y="-10%" width="120%" height="120%">
                        <feOffset in="SourceAlpha" dx="1" dy="1" result="light" />
                        <feFlood flood-color="rgba(255,255,255,0.3)" result="lightColor" />
                        <feComposite in="lightColor" in2="light" operator="in" result="highlight" />
                        <feOffset in="SourceAlpha" dx="-1" dy="-1" result="shadow" />
                        <feFlood flood-color="rgba(0,0,0,0.6)" result="shadowColor" />
                        <feComposite in="shadowColor" in2="shadow" operator="in" result="darkShadow" />
                        <feMerge>
                            <feMergeNode in="darkShadow" />
                            <feMergeNode in="highlight" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <g id="bladeGroup"></g>
            </svg>
        </div>
    </div>
    <div class="content">
        <h1></h1>
        <div class="scroll-content">
            <div class="photo photo1" style="background-image: url('https://images.pexels.com/photos/247599/pexels-photo-247599.jpeg');"></div>
            <div class="photo photo2" style="background-image: url('https://images.pexels.com/photos/709552/pexels-photo-709552.jpeg');"></div>
            <div class="photo photo3" style="background-image: url('https://images.pexels.com/photos/206359/pexels-photo-206359.jpeg');"></div>
            <div class="photo photo4" style="background-image: url('https://images.pexels.com/photos/1955134/pexels-photo-1955134.jpeg');"></div>
            <div class="photo photo5" style="background-image: url('https://images.pexels.com/photos/691668/pexels-photo-691668.jpeg');"></div>
        </div>
    </div>
    <div class="footer">
        <a href="Events.html" class="footer-link">Events</a>
        <a href="Portraits.html" class="footer-link">Portraits</a>
        <a href="Food.html" class="footer-link">Food</a>
        <a href="Lifestyle.html" class="footer-link">Lifestyle</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
